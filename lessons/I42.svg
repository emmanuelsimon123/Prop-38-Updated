<svg id="diagram" viewBox="0 0 840 520" role="img" aria-labelledby="diagramTitle diagramDesc"
     xmlns="http://www.w3.org/2000/svg">
  <title id="diagramTitle">Diagram for Proposition I.42</title>
  <desc id="diagramDesc">
    Given triangle ABC and given angle D. Construct parallelogram FECG equal in area to triangle ABC,
    with angle CEF equal to D.
  </desc>

  <!-- Given angle D (separate) -->
  <g id="angleD_parts">
    <circle cx="650" cy="340" r="2" fill="var(--svg-ink)"/>
    <line id="rayD1" x1="650" y1="340" x2="740" y2="340" stroke="var(--svg-ink)" stroke-width="2"/>
    <line id="rayD2" x1="650" y1="340" x2="715" y2="248" stroke="var(--svg-ink)" stroke-width="2"/>
  </g>

  <!-- Triangle ABC -->
  <g id="triABC_parts">
    <!-- Base BC split into BE and EC so we can reference the midpoint -->
    <g id="BC">
      <line id="BE" x1="150" y1="380" x2="260" y2="380" stroke="var(--svg-ink)" stroke-width="2"/>
      <line id="EC" x1="260" y1="380" x2="370" y2="380" stroke="var(--svg-ink)" stroke-width="2"/>
    </g>

    <line id="AB" x1="240" y1="140" x2="150" y2="380" stroke="var(--svg-ink)" stroke-width="2"/>
    <line id="AC" class="hidden no-draw" aria-hidden="true"
          x1="240" y1="140" x2="370" y2="380" stroke="#64748b" stroke-width="2.6" stroke-dasharray="6 6"/>
    <line id="AC_side" x1="240" y1="140" x2="370" y2="380" stroke="var(--svg-ink)" stroke-width="2"/>
  </g>

  <!-- Midpoint E (revealed) -->
  <circle id="ptE" class="hidden" aria-hidden="true" cx="260" cy="380" r="3.2" fill="var(--svg-ink)"/>

  <line id="tickBE" class="tick hidden" aria-hidden="true"
        x1="235" y1="374" x2="235" y2="386" stroke="var(--svg-ink)" stroke-width="2"/>
  <line id="tickEC" class="tick hidden" aria-hidden="true"
        x1="285" y1="374" x2="285" y2="386" stroke="var(--svg-ink)" stroke-width="2"/>

  <!-- Construction lines (revealed as steps advance) -->
  <line id="AE" class="hidden no-draw" aria-hidden="true"
        x1="240" y1="140" x2="260" y2="380" stroke="#6b7280" stroke-width="2"/>

  <!-- EF is the copied-angle ray from E -->
  <line id="EF" class="hidden no-draw" aria-hidden="true"
        x1="260" y1="380" x2="430" y2="140" stroke="#6b7280" stroke-width="2"/>

  <!-- AG is horizontal through A (parallel EC) -->
  <line id="AG" class="hidden no-draw" aria-hidden="true"
        x1="60" y1="140" x2="780" y2="140" stroke="var(--svg-grid)" stroke-width="2" stroke-dasharray="6 8"/>

  <!-- CG through C parallel EF -->
  <line id="CG" class="hidden no-draw" aria-hidden="true"
        x1="370" y1="380" x2="540" y2="140" stroke="#6b7280" stroke-width="2"/>

  <!-- FG top side -->
  <line id="FG" class="hidden no-draw" aria-hidden="true"
        x1="430" y1="140" x2="540" y2="140" stroke="var(--svg-ink)" stroke-width="2"/>

  <!-- Parallelogram polygon (revealed) -->
  <polygon id="paraFECG" class="hidden" aria-hidden="true"
           points="430,140 260,380 370,380 540,140"
           fill="none" stroke="var(--svg-ink)" stroke-width="2"/>

  <!-- Points F and G (revealed) -->
  <circle id="ptF" class="hidden" aria-hidden="true" cx="430" cy="140" r="3.2" fill="var(--svg-ink)"/>
  <circle id="ptG" class="hidden" aria-hidden="true" cx="540" cy="140" r="3.2" fill="var(--svg-ink)"/>

  <!-- Explore handle for A -->
  <g id="explore-handles" class="hidden" aria-hidden="true">
    <circle id="handleA_ring" class="handle-ring" cx="240" cy="140" r="14"></circle>
    <circle id="handleA" class="handle" cx="240" cy="140" r="8" tabindex="0" aria-label="Drag point A"></circle>
  </g>

  <!-- Labels -->
  <g id="labels" font-size="18" font-weight="bold" fill="var(--svg-ink)">
    <text id="lblA" x="228" y="128">A</text>
    <text id="lblB" x="140" y="405">B</text>
    <text id="lblC" x="362" y="405">C</text>
    <text id="lblE" class="hidden" aria-hidden="true" x="268" y="405">E</text>
    <text id="lblF" class="hidden" aria-hidden="true" x="438" y="130">F</text>
    <text id="lblG" class="hidden" aria-hidden="true" x="548" y="130">G</text>

    <text id="lblD" x="642" y="366">D</text>
  </g>
</svg>
